<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Senha Seguro</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #d1d5db;
            --focus-ring: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --warning-bg: #fef2f2;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--focus-ring);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-btn:hover { color: var(--text-main); }
        .toggle-btn svg { width: 20px; height: 20px; }

        #resultado { font-size: 0.95rem; min-height: 180px; }

        .mensagem-inicial {
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
            margin-top: 20px;
        }

        .sucesso {
            color: var(--success);
            text-align: center;
            font-weight: 600;
            padding: 15px;
            background-color: #d1fae5;
            border-radius: 8px;
            margin-top: 10px;
        }

        .invalido-container {
            background-color: var(--warning-bg);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--error);
        }

        .invalido-titulo {
            color: var(--error);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .requisitos-lista {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-main);
        }

        .requisitos-lista li {
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }

        .requisitos-lista li::before {
            content: "•";
            color: var(--error);
            font-weight: bold;
            margin-right: 8px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Crie sua Senha</h2>

    <div class="input-group">
        <input type="password" id="senhaInput" placeholder="Digite sua senha...">
        <button type="button" class="toggle-btn" id="togglePassword" title="Mostrar senha">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
        </button>
    </div>

    <div id="resultado">
        <div class="mensagem-inicial">Comece a digitar para validar.</div>
    </div>
</div>

<script>
    const senhaInput = document.getElementById('senhaInput');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');
    const resultadoDiv = document.getElementById('resultado');

    let debounceTimer;

    togglePasswordBtn.addEventListener('click', () => {
        const isPassword = senhaInput.type === 'password';
        senhaInput.type = isPassword ? 'text' : 'password';

        if (isPassword) {
            eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            togglePasswordBtn.title = "Ocultar senha";
        } else {
            eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;
            togglePasswordBtn.title = "Mostrar senha";
        }
    });

    senhaInput.addEventListener('input', () => {
        const senha = senhaInput.value;

        if (!senha) {
            resultadoDiv.innerHTML = '<div class="mensagem-inicial">Comece a digitar para validar.</div>';
            return;
        }

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            validarNaAPI(senha);
        }, 300);
    });

    async function validarNaAPI(senha) {
        try {
            const response = await fetch('/api/v1/passwords/validation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: senha })
            });

            const data = await response.json();

            if (data.isValid) {
                resultadoDiv.innerHTML = "<div class='sucesso'>✅ Senha atende a todos os requisitos!</div>";
            } else {
                resultadoDiv.innerHTML = `
                    <div class="invalido-container">
                        <div class="invalido-titulo">A senha deve conter:</div>
                        <ul class="requisitos-lista">
                            <li>Mínimo de 9 caracteres</li>
                            <li>Ao menos 1 letra minúscula e 1 maiúscula</li>
                            <li>Ao menos 1 dígito (0-9)</li>
                            <li>Ao menos 1 caractere especial (!@#$%^&*()-+)</li>
                            <li>Nenhum caractere repetido</li>
                            <li>Nenhum espaço em branco</li>
                        </ul>
                    </div>
                `;
            }
        } catch (error) {
            resultadoDiv.innerHTML = "<div class='invalido-titulo' style='text-align:center; margin-top:20px;'>Erro ao conectar com a API.</div>";
        }
    }
</script>

</body>
</html>
